version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: invs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invs_user
      POSTGRES_PASSWORD: invs_password
      POSTGRES_DB: invs_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U invs_user -d invs_db']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invs_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://invs_user:invs_password@postgres:5432/invs_db?schema=public
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev

volumes:
  postgres_data:
